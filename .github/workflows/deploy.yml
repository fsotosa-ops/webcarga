name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "extraction_service/**"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: webcarga-extraction
  REPOSITORY: webcarga
  IMAGE_NAME: extraction-service
  CLOUD_RUN_SA: ${{ secrets.CLOUD_RUN_SA_EMAIL }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Requerido para Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
            ./extraction_service

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: >-
            --memory=2Gi
            --cpu=2
            --timeout=300
            --concurrency=1
            --min-instances=0
            --max-instances=3
            --no-cpu-throttling
            --service-account=${{ env.CLOUD_RUN_SA }}
            --allow-unauthenticated
            --set-env-vars=BROWSER_HEADLESS=true
            --set-secrets=QANALYTICS_USER=qanalytics-user:latest,QANALYTICS_PASS=qanalytics-pass:latest,WINGSUITE_USER=wingsuite-user:latest,WINGSUITE_PASS=wingsuite-pass:latest,GCS_BUCKET_NAME=gcs-bucket-name:latest

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "🚀 Service deployed at: ${URL}"
          echo "Health check: ${URL}/api/v1/health"
